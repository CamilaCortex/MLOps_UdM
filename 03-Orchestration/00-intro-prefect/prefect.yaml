
# Define deployments
deployments:
  - name: simple-flow-deployment
    entrypoint: flows/weather1-flow.py:fetch_weather
    schedule:
      cron: "*/10 * * * *"
      timezone: "America/Bogota"
    parameters:
      lat: 6.2476
      lon: -75.5658

  - name: scheduled-flow
    entrypoint: flows/weather1-flow.py:fetch_weather
    schedule:
      cron: "0 */2 * * *"
      timezone: "America/Bogota"
    parameters:
      lat: 4.7110
      lon: -74.0721

# prefect deployment run fetch-weather/simple-flow-deployment
# prefect deployment ls
# prefect deployment delete <flow-name>/<deployment-name>